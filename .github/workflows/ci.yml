name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=swarm_test --cov-report=term-missing --cov-report=xml --cov-fail-under=70

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: |
          pip install "ruff==0.15.12" "black>=24,<27" "mypy>=1.7,<3"

      - name: Run ruff
        run: ruff check swarm_test/

      - name: Run black check
        run: black --check swarm_test/

      - name: Run mypy
        run: mypy swarm_test/ --ignore-missing-imports

  example:
    name: Run example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run research_crew example
        run: python examples/research_crew.py
        timeout-minutes: 2

      - name: Test CLI probe
        run: swarm-test --help

      - name: Test CLI scan
        run: |
          swarm-test scan \
            --agents ResearchAgent --agents DataAgent --agents WriterAgent \
            --edges "ResearchAgent:DataAgent" --edges "DataAgent:WriterAgent" \
            --name "ci-test-swarm"
